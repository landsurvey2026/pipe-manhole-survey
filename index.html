<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>원형관로 조사 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.9.2/proj4.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F1F4F7;
  --panel:#FFFFFF;
  --panel-2:#F3F6F9;
  --border:#DCE3EA;
  --text:#1C2733;
  --text-dim:#6B7A89;
  --accent:#0B63CE;
  --accent-2:#1FAE6E;
  --st-none:#FF5252;
  --st-progress:#FFC400;
  --st-done:#00C853;
  --st-bad:#D32F2F;
  --grid:rgba(11,99,206,0.08);
  --mono: 'IBM Plex Mono','SFMono-Regular','Roboto Mono','Consolas',monospace;
  --sans: 'IBM Plex Sans KR',-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo','Segoe UI',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);height:100%;}
body{display:flex;flex-direction:column;min-height:100vh;}

/* header */
header{padding:14px 20px;border-bottom:1px solid var(--border);background:linear-gradient(135deg,#0B63CE,#0A4FA3);display:flex;align-items:center;gap:18px;flex-wrap:wrap;box-shadow:0 2px 10px rgba(11,99,206,0.18);}
.brand{display:flex;flex-direction:column;gap:2px;}
.brand .title{font-weight:700;font-size:16px;letter-spacing:0.2px;color:#fff;}
.brand .sub{font-size:10.5px;color:rgba(255,255,255,0.75);font-family:var(--mono);letter-spacing:0.4px;}
.dash{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap;}
.dash-card{background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.25);border-radius:8px;padding:8px 14px;min-width:78px;text-align:center;}
.dash-card .n{font-family:var(--mono);font-size:20px;font-weight:700;line-height:1.1;color:#fff;}
.dash-card .l{font-size:10px;color:rgba(255,255,255,0.75);margin-top:2px;}
.dash-card.done .n{color:#B9F3D6;}
.dash-card.prog .n{color:#FFD48A;}
.dash-card.none .n{color:rgba(255,255,255,0.75);}
.progress-wrap{width:180px;display:flex;flex-direction:column;gap:4px;justify-content:center;}
.progress-bar{height:8px;border-radius:4px;background:rgba(255,255,255,0.25);overflow:hidden;border:1px solid rgba(255,255,255,0.3);}
.progress-fill{height:100%;background:linear-gradient(90deg,#7FD4FF,#B9F3D6);transition:width .4s ease;}
.progress-label{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,0.85);}

/* layout */
.main{display:grid;grid-template-columns:1fr 0px;flex:1;min-height:0;transition:grid-template-columns .18s ease;}

/* 관리자/검색/현황 팝업 모달 */
.menu-modal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,20,26,0.35);z-index:900;}
.menu-modal-backdrop.open{display:block;}
.menu-modal{display:none;flex-direction:column;position:fixed;top:78px;left:20px;width:320px;max-height:calc(100vh - 110px);background:var(--panel);border:1px solid var(--border);border-radius:14px;box-shadow:0 16px 40px rgba(15,20,26,0.28);z-index:901;overflow:hidden;}
.menu-modal.open{display:flex;}
.menu-modal-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.menu-modal-title{font-weight:700;font-size:13.5px;color:var(--text);}
.menu-modal-close{background:var(--panel-2);border:1px solid var(--border);border-radius:7px;width:26px;height:26px;color:var(--text-dim);cursor:pointer;font-size:13px;line-height:1;}
.menu-modal-close:hover{color:var(--accent);border-color:var(--accent);}
.menu-modal-body{flex:1;min-height:0;display:flex;flex-direction:column;}
@media (max-width:860px){
  .menu-modal{left:10px;right:10px;width:auto;top:auto;bottom:64px;max-height:70vh;border-radius:14px;}
}
.panel{border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;background:var(--panel);overflow:hidden;}
.main > .panel:last-child{border-right:none;border-left:1px solid var(--border);}

/* sidebar left */
.side-section{padding:14px;border-bottom:1px solid var(--border);}
.upload-box{border:1.5px dashed var(--border);border-radius:10px;padding:16px;text-align:center;cursor:pointer;transition:.15s;}
.upload-box:hover{border-color:var(--accent);background:rgba(11,99,206,0.05);}
.upload-box input{display:none;}
.upload-box .ic{font-size:22px;margin-bottom:4px;}
.upload-box .t1{font-size:12.5px;font-weight:600;}
.upload-box .t2{font-size:10.5px;color:var(--text-dim);margin-top:3px;font-family:var(--mono);}
.search-input{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:7px;font-size:13px;font-family:var(--mono);}
.search-input:focus{outline:none;border-color:var(--accent);}
.filter-tabs{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap;}
.ftab{font-size:11px;padding:5px 9px;border-radius:6px;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;}
.ftab.active{background:var(--accent);color:#fff;border-color:var(--accent);font-weight:700;}
.list-wrap{flex:1;overflow-y:auto;}

/* side menu bar */
.top-toolbar{display:flex;gap:6px;}
.top-toolbar button{background:rgba(255,255,255,0.14);border:1px solid rgba(255,255,255,0.3);border-radius:7px;padding:7px 13px;font-family:var(--sans);font-size:12px;font-weight:600;color:rgba(255,255,255,0.85);cursor:pointer;}
.top-toolbar button.active{color:#0B63CE;background:#fff;border-color:#fff;}
.menu-content{display:flex;flex-direction:column;flex:1;min-height:0;}
.sub-tabs{display:flex;gap:6px;}
.stab{font-size:11.5px;padding:6px 12px;border-radius:16px;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-weight:600;}
.stab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
#statusManholeView{display:flex;flex-direction:column;flex:1;min-height:0;}
.mode-tabs{display:flex;gap:5px;margin-bottom:6px;}
.mtab{flex:1;font-size:11px;padding:6px 4px;border-radius:6px;background:var(--panel-2);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;font-weight:600;text-align:center;}
.mtab.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.mtab[data-mode="replace"].active{background:var(--st-progress);border-color:var(--st-progress);}
.mtab[data-mode="delete"].active{background:var(--st-bad);border-color:var(--st-bad);}
.mode-hint{font-size:10.5px;color:var(--text-dim);margin-bottom:8px;line-height:1.4;}
.mh-row{padding:9px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12.5px;}
.mh-row:hover{background:var(--panel-2);}
.mh-row.selected{background:rgba(11,99,206,0.08);border-left:3px solid var(--accent);}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mh-row .id{font-family:var(--mono);font-weight:600;}
.mh-row .st{margin-left:auto;font-size:10.5px;color:var(--text-dim);}
.empty-note{padding:20px 14px;color:var(--text-dim);font-size:12px;text-align:center;line-height:1.6;}

/* center map */
.center-panel{position:relative;background:var(--bg);}
.view-toggle{position:absolute;top:12px;left:12px;z-index:410;display:flex;gap:6px;background:rgba(18,26,32,0.85);padding:4px;border-radius:8px;border:1px solid var(--border);backdrop-filter:blur(4px);}
.view-toggle button{background:transparent;border:none;color:var(--text-dim);font-size:12px;padding:6px 10px;border-radius:6px;cursor:pointer;font-family:var(--sans);}
.view-toggle button.active{background:var(--accent);color:#fff;font-weight:700;}
.map-svg{width:100%;height:100%;display:block;}
.legend{position:absolute;bottom:10px;left:12px;z-index:410;display:flex;gap:12px;background:rgba(18,26,32,0.85);padding:7px 12px;border-radius:8px;border:1px solid var(--border);font-size:10.5px;color:var(--text-dim);}
.leaflet-control-attribution{font-size:10px;color:var(--text-dim);background:rgba(255,255,255,0.85);}
.legend span{display:inline-flex;align-items:center;gap:5px;}
.legend .dot{width:8px;height:8px;}
.table-wrap{width:100%;height:100%;overflow:auto;padding:10px 14px 14px;}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{position:sticky;top:0;background:var(--panel-2);color:var(--text-dim);text-align:left;padding:8px 10px;font-size:10.5px;letter-spacing:0.4px;border-bottom:1px solid var(--border);cursor:pointer;}
td{padding:7px 10px;border-bottom:1px solid var(--border);font-family:var(--mono);}
tr.tbrow:hover{background:var(--panel-2);cursor:pointer;}
tr.tbrow.selected{background:rgba(11,99,206,0.08);}

/* right detail */
.detail-panel{padding:16px;overflow-y:auto;}
.detail-empty{color:var(--text-dim);font-size:12.5px;text-align:center;margin-top:60px;line-height:1.7;}
.detail-empty .ic{font-size:26px;display:block;margin-bottom:8px;}
.d-title{font-family:var(--mono);font-size:17px;font-weight:700;margin-bottom:2px;}
.d-coords{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:16px;}
.field{margin-bottom:13px;}
.field label{display:block;font-size:11px;color:var(--text-dim);margin-bottom:5px;letter-spacing:0.2px;}
.field select, .field input[type=text], .field input[type=date], .field textarea{
  width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);
  padding:8px 9px;border-radius:6px;font-size:12.5px;font-family:var(--sans);
}
.field textarea{resize:vertical;min-height:56px;font-family:var(--sans);}
.check-row{display:flex;align-items:center;gap:8px;background:var(--panel-2);border:1px solid var(--border);border-radius:6px;padding:9px 10px;}
.check-row input{width:16px;height:16px;accent-color:var(--accent);}
.status-select{font-weight:700;}
hr.sep{border:none;border-top:1px solid var(--border);margin:16px 0;}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#152026;border:1px solid var(--accent);color:var(--accent);padding:9px 18px;border-radius:20px;font-size:12.5px;font-family:var(--mono);opacity:0;pointer-events:none;transition:opacity .25s ease, transform .25s ease;z-index:100;}

/* mobile tab bar */
.mobile-tabbar{display:none;}
@media (max-width:860px){
  header{padding:10px 12px;gap:8px;}
  .brand .title{font-size:14px;}
  .brand .sub{display:none;}
  .dash{gap:6px;}
  .dash-card{min-width:52px;padding:6px 8px;}
  .dash-card .n{font-size:15px;}
  .dash-card .l{font-size:9px;}
  .progress-wrap{width:96px;}
  .progress-label{font-size:9.5px;}

  .main{grid-template-columns:1fr;}
  .panel{display:none !important;border-right:none;border-left:none;}
  .panel.mobile-active{display:flex !important;}
  .main > .panel:last-child{border-left:none;}

  .mobile-tabbar{display:flex;flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);}
  .mobile-tabbar button{flex:1;background:transparent;border:none;font-family:var(--sans);font-size:11px;color:var(--text-dim);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0px));cursor:pointer;}
  .mobile-tabbar button .ic{font-size:18px;}
  .mobile-tabbar button.active{color:var(--accent);font-weight:700;}

  .top-toolbar{gap:5px;order:3;width:100%;}
  .top-toolbar button{padding:6px 10px;font-size:11.5px;}

  .menu-modal .list-wrap{flex:1;}
  .view-toggle{top:8px;left:8px;}
  #basemapToggle{top:44px;}
  .legend{bottom:8px;left:8px;flex-wrap:wrap;max-width:60%;font-size:9.5px;gap:6px;}
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}

/* map svg elements */
.scan-line{animation:sweep 5s linear infinite;}
@keyframes sweep{0%{transform:translateY(0);opacity:0;}5%{opacity:.5;}50%{opacity:.15;}95%{opacity:.5;}100%{transform:translateY(100%);opacity:0;}}
.mh-dot{cursor:pointer;transition:r .12s ease;}
.mh-dot:hover{filter:brightness(1.3);}
.pulse{animation:pulse 1.8s ease-in-out infinite;}
@keyframes pulse{0%{opacity:.55;}50%{opacity:.05;}100%{opacity:.55;}}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="title">원형관로 조사 현황</div>
    <div class="sub">CIRCULAR SEWER PIPE · MANHOLE SURVEY CONTROL · LiDAR SCAN / INVERT·LADDER·FALL-PREVENTION INSPECTION</div>
  </div>
  <div class="top-toolbar">
    <button data-menu="admin">⚙ 관리자</button>
    <button data-menu="search">🔍 검색</button>
    <button data-menu="status" class="active">📊 현황</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-label"><span id="pct">0</span>% 완료 (<span id="doneCount2">0</span>/<span id="totalCount2">0</span>)</div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="dash">
    <div class="dash-card"><div class="n" id="totalCount">0</div><div class="l">전체</div></div>
    <div class="dash-card none"><div class="n" id="noneCount">0</div><div class="l">미착수</div></div>
    <div class="dash-card prog"><div class="n" id="progCount">0</div><div class="l">진행중</div></div>
    <div class="dash-card done"><div class="n" id="doneCount">0</div><div class="l">완료</div></div>
  </div>
</header>

<div class="menu-modal-backdrop" id="menuBackdrop"></div>
<div class="menu-modal" id="menuModal">
  <div class="menu-modal-header">
    <div class="menu-modal-title" id="menuModalTitle">현황</div>
    <button class="menu-modal-close" id="menuModalClose">✕</button>
  </div>
  <div class="menu-modal-body">
    <div class="menu-content" id="menuAdmin" style="display:none;">
      <div class="side-section">
        <div class="mode-tabs" data-mode-group="manhole">
          <button class="mtab active" data-mode="add">추가</button>
          <button class="mtab" data-mode="replace">전체</button>
          <button class="mtab" data-mode="delete">삭제</button>
        </div>
        <div class="mode-hint" id="manholeModeHint">엑셀의 맨홀만 새로 추가/갱신하고, 기존 맨홀은 그대로 둡니다.</div>
        <label class="upload-box" id="uploadBox">
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv">
          <div class="ic">📤</div>
          <div class="t1">맨홀 엑셀 업로드 (맨홀번호, X, Y, Z)</div>
          <div class="t2">.xlsx / .xls / .csv 지원</div>
        </label>
      </div>
      <div class="side-section">
        <div class="mode-tabs" data-mode-group="cp">
          <button class="mtab active" data-mode="add">추가</button>
          <button class="mtab" data-mode="replace">전체</button>
          <button class="mtab" data-mode="delete">삭제</button>
        </div>
        <div class="mode-hint" id="cpModeHint">엑셀의 기준점만 새로 추가/갱신하고, 기존 기준점은 그대로 둡니다.</div>
        <label class="upload-box" id="cpUploadBox">
          <input type="file" id="cpFileInput" accept=".xlsx,.xls,.csv">
          <div class="ic">📐</div>
          <div class="t1">기준점 엑셀 업로드 (기준점명, X, Y, Z)</div>
          <div class="t2">.xlsx / .xls / .csv 지원 · 이름 기준으로 갱신</div>
        </label>
      </div>
    </div>

    <div class="menu-content" id="menuSearch" style="display:none;">
      <div class="side-section" style="padding-bottom:10px;">
        <input class="search-input" id="searchInput" placeholder="맨홀번호 검색...">
      </div>
      <div class="list-wrap" id="searchListSlot"></div>
    </div>

    <div class="menu-content" id="menuStatus">
      <div class="side-section" style="padding-bottom:10px;">
        <div class="sub-tabs" id="statusSubTabs">
          <div class="stab active" data-sub="manhole">맨홀조사</div>
          <div class="stab" data-sub="cp">기준점현황</div>
        </div>
      </div>
      <div id="statusManholeView">
        <div class="side-section" style="padding-top:0;padding-bottom:10px;">
          <div class="filter-tabs" id="filterTabs">
            <div class="ftab active" data-f="all">전체</div>
            <div class="ftab" data-f="미착수">미착수</div>
            <div class="ftab" data-f="진행중">진행중</div>
            <div class="ftab" data-f="완료">완료</div>
          </div>
        </div>
        <div class="list-wrap" id="statusListSlot"></div>
      </div>
      <div id="statusCPView" style="display:none;">
        <div class="side-section" style="display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:12px;font-weight:700;color:var(--text-dim);">기준점 <span id="cpCount">0</span>개</div>
        </div>
        <div id="cpList" style="padding:0 14px 14px;font-size:11.5px;font-family:var(--mono);overflow-y:auto;flex:1;"></div>
      </div>
    </div>
  </div>
</div>

<div class="main">
  <div class="panel center-panel">
    <div class="view-toggle">
      <button class="active" data-v="map">지도</button>
      <button data-v="table">표</button>
    </div>
    <div class="view-toggle" id="basemapToggle" style="top:54px;">
      <button class="active" data-b="map">일반지도</button>
      <button data-b="sat">위성영상</button>
    </div>
    <div id="mapHost" style="width:100%;height:100%;"></div>
    <div id="tableHost" style="width:100%;height:100%;display:none;"></div>
    <div class="legend">
      <span><i class="dot" style="background:var(--st-none)"></i>미착수</span>
      <span><i class="dot" style="background:var(--st-progress)"></i>진행중</span>
      <span><i class="dot" style="background:var(--st-done)"></i>완료</span>
      <span>▲ 기준점</span>
    </div>
  </div>

  <div class="panel detail-panel-wrap">
    <div class="detail-panel" id="detailPanel"></div>
  </div>
</div>

<div class="mobile-tabbar">
  <button class="tab-list" data-tab="list"><span class="ic">📋</span>목록</button>
  <button class="tab-map active" data-tab="map"><span class="ic">🗺️</span>지도</button>
  <button class="tab-detail" data-tab="detail"><span class="ic">📝</span>상세</button>
</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'seoul-sewer-manhole-data';
const STATUS_COLORS = {'미착수':'var(--st-none)','진행중':'var(--st-progress)','완료':'var(--st-done)'};
const STATUS_HEX = {'미착수':'#FF5252','진행중':'#FFC400','완료':'#00C853'};

let state = { order: [], manholes: {}, controlPoints: [] };
let selectedId = null;
let mobileTab = 'map';
function updateMainLayout(){
  const mainEl = document.querySelector('.main');
  if(!mainEl) return;
  if(window.innerWidth <= 860){ mainEl.style.gridTemplateColumns = ''; return; }
  mainEl.style.gridTemplateColumns = selectedId ? '1fr 300px' : '1fr 0px';
  setTimeout(()=>{ if(leafletMap) leafletMap.invalidateSize(); }, 220);
}
function selectManhole(id){
  selectedId = id;
  renderAll();
  if(window.innerWidth <= 860) setMobileTab('detail');
}
function setMobileTab(tab){
  if(tab==='list'){ showMenu(activeMenu || 'status'); return; }
  mobileTab = tab;
  const centerPanel = document.querySelector('.center-panel');
  const detailPanel = document.querySelector('.detail-panel-wrap');
  if(centerPanel) centerPanel.classList.toggle('mobile-active', tab==='map');
  if(detailPanel) detailPanel.classList.toggle('mobile-active', tab==='detail');
  document.querySelectorAll('.mobile-tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
  if(tab==='map' && leafletMap) setTimeout(()=>leafletMap.invalidateSize(), 80);
}
document.querySelectorAll('.mobile-tabbar button').forEach(b=>{
  b.addEventListener('click', ()=>setMobileTab(b.dataset.tab));
});
let filterStatus = 'all';
let searchTerm = '';
let viewMode = 'map';
let statusSub = 'manhole';
let manholeUploadMode = 'add';
let cpUploadMode = 'add';

const MODE_HINTS = {
  add: (label)=>`엑셀의 ${label}만 새로 추가/갱신하고, 기존 ${label}은 그대로 둡니다.`,
  replace: (label)=>`기존 ${label}을 모두 지우고 엑셀 내용으로 전체 교체합니다. (같은 이름/번호는 기존 조사현황 유지)`,
  delete: (label)=>`엑셀에 있는 ${label}만 현재 목록에서 삭제합니다.`
};
function wireModeTabs(groupName, label){
  const group = document.querySelector(`[data-mode-group="${groupName}"]`);
  const hint = document.getElementById(groupName==='manhole' ? 'manholeModeHint' : 'cpModeHint');
  group.querySelectorAll('.mtab').forEach(b=>{
    b.addEventListener('click', ()=>{
      group.querySelectorAll('.mtab').forEach(x=>x.classList.remove('active'));
      b.classList.add('active');
      if(groupName==='manhole') manholeUploadMode = b.dataset.mode; else cpUploadMode = b.dataset.mode;
      hint.textContent = MODE_HINTS[b.dataset.mode](label);
    });
  });
}
wireModeTabs('manhole','맨홀');
wireModeTabs('cp','기준점');

function findColIdx(header, candidates, fallback){
  for(const c of candidates){
    const idx = header.findIndex(h=>h.includes(c));
    if(idx!==-1) return idx;
  }
  return fallback;
}

/* ---------- 좌측 사이드바: 관리자 / 검색 / 현황 메뉴 ---------- */
// listWrap은 검색/현황(맨홀조사) 중 활성화된 슬롯으로 옮겨 붙는 공용 리스트 컨테이너

let activeMenu = null;
const MENU_TITLES = {admin:'⚙ 관리자', search:'🔍 검색', status:'📊 현황'};

function openMenuModal(){
  document.getElementById('menuModal').classList.add('open');
  document.getElementById('menuBackdrop').classList.add('open');
}
function closeMenuModal(){
  document.getElementById('menuModal').classList.remove('open');
  document.getElementById('menuBackdrop').classList.remove('open');
  document.querySelectorAll('.top-toolbar button').forEach(b=>b.classList.remove('active'));
  if(searchTerm){ searchTerm=''; document.getElementById('searchInput').value=''; }
  activeMenu = null;
}
function showMenu(name){
  if(activeMenu===name){ closeMenuModal(); return; }
  activeMenu = name;
  openMenuModal();
  document.getElementById('menuModalTitle').textContent = MENU_TITLES[name] || '';
  document.querySelectorAll('.top-toolbar button').forEach(b=>b.classList.toggle('active', b.dataset.menu===name));
  document.getElementById('menuAdmin').style.display = name==='admin' ? 'flex' : 'none';
  document.getElementById('menuSearch').style.display = name==='search' ? 'flex' : 'none';
  document.getElementById('menuStatus').style.display = name==='status' ? 'flex' : 'none';

  if(name==='search'){
    document.getElementById('searchListSlot').appendChild(listWrapEl);
    setTimeout(()=>document.getElementById('searchInput').focus(), 80);
  }else{
    if(searchTerm){ searchTerm=''; document.getElementById('searchInput').value=''; }
    if(name==='status' && statusSub==='manhole'){
      document.getElementById('statusListSlot').appendChild(listWrapEl);
    }
  }
  renderAll();
}
document.querySelectorAll('.top-toolbar button').forEach(b=>{
  b.addEventListener('click', ()=>showMenu(b.dataset.menu));
});
document.getElementById('menuModalClose').addEventListener('click', closeMenuModal);

function showStatusSub(name){

  document.querySelectorAll('#statusSubTabs .stab').forEach(b=>b.classList.toggle('active', b.dataset.sub===name));

    renderList();

function blankRecord(id,x,y,z){
  return {id,x,y,z,status:'미착수',lidar:false,invert:'미확인',ladder:'미확인',fall:'미확인',inspector:'',date:'',note:''};
}

async function loadState(){
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){ state = JSON.parse(res.value); }
  }catch(e){ /* no data yet */ }
  if(!state.controlPoints) state.controlPoints = [];
}
let lastSaveAt = 0;
async function saveState(){
  try{
    const r = await window.storage.set(STORAGE_KEY, JSON.stringify(state), true);
    if(!r) showToast('저장 실패 (네트워크 확인)');
    else lastSaveAt = Date.now();
  }catch(e){ console.error(e); showToast('저장 실패'); }
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(()=>t.classList.remove('show'), 1800);
}

/* ---------- 기준점(Control Point) 업로드 — X,Y,Z 모두 사용 ---------- */
document.getElementById('cpFileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});
  if(!rows.length){ showToast('빈 파일입니다'); e.target.value=''; return; }
  const header = rows[0].map(h=>String(h??'').trim().toLowerCase());
  const nameIdx = findColIdx(header, ['기준점','명칭','이름','name'], 0);
  const xIdx = findColIdx(header, ['x'], 1);
  const yIdx = findColIdx(header, ['y'], 2);
  const zIdx = findColIdx(header, ['z','표고'], 3);
  const parsed = [];
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(!row || !row.length) continue;
    const name = String(row[nameIdx] ?? '').trim();
    if(!name) continue;
    parsed.push({name, x:parseFloat(row[xIdx]), y:parseFloat(row[yIdx]), z:parseFloat(row[zIdx])});
  }
  if(!parsed.length){ showToast('인식된 기준점 데이터가 없습니다'); e.target.value=''; return; }

  if(cpUploadMode==='delete'){
    if(!confirm(`엑셀에 있는 기준점 ${parsed.length}건을 현재 목록에서 삭제할까요?`)){ e.target.value=''; return; }
    let removed=0;
    parsed.forEach(r=>{
      const idx = state.controlPoints.findIndex(cp=>cp.name===r.name);
      if(idx>=0){ state.controlPoints.splice(idx,1); removed++; }
    });
    await saveState();
    showToast(`기준점 ${removed}건 삭제됨`);
  }else if(cpUploadMode==='replace'){
    if(!confirm(`기존 기준점을 모두 지우고 엑셀 내용(${parsed.length}건)으로 전체 교체할까요?`)){ e.target.value=''; return; }
    state.controlPoints = parsed;
    await saveState();
    showToast(`기준점 전체교체 완료 · ${parsed.length}건`);
  }else{
    let added=0, updated=0;
    parsed.forEach(r=>{
      const existing = state.controlPoints.find(cp=>cp.name===r.name);
      if(existing){ existing.x=r.x; existing.y=r.y; existing.z=r.z; updated++; }
      else{ state.controlPoints.push(r); added++; }
    });
    await saveState();
    showToast(`기준점 업로드 완료 · 신규 ${added}건 / 갱신 ${updated}건`);
  }
  renderAll();
  e.target.value = '';
});

function renderCPList(){
  const list = document.getElementById('cpList');
  const cnt = document.getElementById('cpCount');
  cnt.textContent = state.controlPoints.length;
  if(!state.controlPoints.length){
    list.innerHTML = '<div style="color:var(--text-dim);font-family:var(--sans);font-size:11.5px;">업로드된 기준점이 없습니다.</div>';
    return;
  }
  list.innerHTML = state.controlPoints.map((cp,i)=>`
    <div class="cp-row" data-i="${i}" style="padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;">
      <div style="font-weight:600;color:var(--text);">▲ ${cp.name}</div>
      <div style="color:var(--text-dim);font-size:10.5px;">X:${cp.x} Y:${cp.y} Z:${cp.z}</div>
    </div>`).join('');
  list.querySelectorAll('.cp-row').forEach(r=>{
    r.addEventListener('click', ()=>{
      const cp = state.controlPoints[+r.dataset.i];
      const ll = toLatLng(cp.x, cp.y);
      if(ll && leafletMap){ leafletMap.setView(ll, 18); }
    });
  });
}

/* ---------- Excel parsing ---------- */
document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, {type:'array'});
  const ws = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(ws, {header:1, raw:true});
  if(!rows.length){ showToast('빈 파일입니다'); e.target.value=''; return; }
  const header = rows[0].map(h=>String(h??'').trim().toLowerCase());
  const idIdx = findColIdx(header, ['맨홀','manhole','no','번호','id'], 0);
  const xIdx  = findColIdx(header, ['x좌표','x'], 1);
  const yIdx  = findColIdx(header, ['y좌표','y'], 2);
  const zIdx  = findColIdx(header, ['표고','z좌표','z'], 3);

  const parsed = [];
  for(let i=1;i<rows.length;i++){
    const row = rows[i];
    if(!row || !row.length) continue;
    const id = String(row[idIdx] ?? '').trim();
    if(!id) continue;
    parsed.push({id, x:parseFloat(row[xIdx]), y:parseFloat(row[yIdx]), z:parseFloat(row[zIdx])});
  }
  if(!parsed.length){ showToast('인식된 맨홀 데이터가 없습니다'); e.target.value=''; return; }

  if(manholeUploadMode==='delete'){
    if(!confirm(`엑셀에 있는 맨홀 ${parsed.length}건을 현재 목록에서 삭제할까요? (조사현황도 함께 삭제됩니다)`)){ e.target.value=''; return; }
    let removed=0;
    parsed.forEach(r=>{
      if(state.manholes[r.id]){
        delete state.manholes[r.id];
        state.order = state.order.filter(id=>id!==r.id);
        removed++;
      }
    });
    if(selectedId && !state.manholes[selectedId]) selectedId = null;
    await saveState();
    showToast(`맨홀 ${removed}건 삭제됨`);
  }else if(manholeUploadMode==='replace'){
    if(!confirm(`기존 맨홀 데이터를 모두 지우고 엑셀 내용(${parsed.length}건)으로 전체 교체할까요?\n(같은 맨홀번호는 기존 조사현황을 유지합니다)`)){ e.target.value=''; return; }
    const newManholes = {};
    const newOrder = [];
    let kept=0, added=0;
    parsed.forEach(r=>{
      if(state.manholes[r.id]){
        newManholes[r.id] = {...state.manholes[r.id], x:r.x, y:r.y, z:r.z};
        kept++;
      }else{
        newManholes[r.id] = blankRecord(r.id, r.x, r.y, r.z);
        added++;
      }
      newOrder.push(r.id);
    });
    state.manholes = newManholes;
    state.order = newOrder;
    if(selectedId && !state.manholes[selectedId]) selectedId = null;
    await saveState();
    showToast(`맨홀 전체교체 완료 · 유지 ${kept}건 / 신규 ${added}건`);
  }else{
    let added=0, updated=0;
    parsed.forEach(r=>{
      if(state.manholes[r.id]){
        state.manholes[r.id].x = r.x; state.manholes[r.id].y = r.y; state.manholes[r.id].z = r.z;
        updated++;
      }else{
        state.manholes[r.id] = blankRecord(r.id, r.x, r.y, r.z);
        state.order.push(r.id);
        added++;
      }
    });
    await saveState();
    showToast(`업로드 완료 · 신규 ${added}건 / 갱신 ${updated}건`);
  }
  renderAll();
  e.target.value = '';
});

/* ---------- filtered list helper ---------- */
function getFilteredIds(){
  return state.order.filter(id=>{
    const m = state.manholes[id];
    if(!m) return false;
    if(filterStatus!=='all' && m.status!==filterStatus) return false;
    if(searchTerm && !m.id.toLowerCase().includes(searchTerm)) return false;
    return true;
  });
}

/* ---------- render: dashboard ---------- */
function renderDashboard(){
  const all = state.order.map(id=>state.manholes[id]).filter(Boolean);
  const total = all.length;
  const done = all.filter(m=>m.status==='완료').length;
  const prog = all.filter(m=>m.status==='진행중').length;
  const none = all.filter(m=>m.status==='미착수').length;
  document.getElementById('totalCount').textContent = total;
  document.getElementById('doneCount').textContent = done;
  document.getElementById('progCount').textContent = prog;
  document.getElementById('noneCount').textContent = none;
  document.getElementById('totalCount2').textContent = total;
  document.getElementById('doneCount2').textContent = done;
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('pct').textContent = pct;
  document.getElementById('progFill').style.width = pct+'%';
}

/* ---------- render: left list ---------- */
function renderList(){
  const wrap = document.getElementById('listWrap');
  const ids = getFilteredIds();
  if(!state.order.length){
    wrap.innerHTML = '<div class="empty-note">아직 업로드된 맨홀 데이터가 없습니다.<br>상단에서 엑셀 파일을 업로드하세요.</div>';
    return;
  }
  if(!ids.length){
    wrap.innerHTML = '<div class="empty-note">조건에 맞는 맨홀이 없습니다.</div>';
    return;
  }
  wrap.innerHTML = ids.map(id=>{
    const m = state.manholes[id];
    const sel = id===selectedId ? 'selected':'';
    return `<div class="mh-row ${sel}" data-id="${id}">
      <span class="dot" style="background:${STATUS_COLORS[m.status]}"></span>
      <span class="id">${m.id}</span>
      <span class="st">${m.status}</span>
    </div>`;
  }).join('');
  wrap.querySelectorAll('.mh-row').forEach(r=>{
    r.addEventListener('click', ()=>{ selectManhole(r.dataset.id); });
  });
}

/* ---------- render: center (map or table) — VWorld + Leaflet ---------- */
const VWORLD_KEY = 'C4DA8041-6991-371D-9C2B-F8C2BCC78E5E';
// 중부원점(2010, GRS80) — 엑셀 X=남북(종거), Y=동서(횡거)
proj4.defs('EPSG:5186','+proj=tmerc +lat_0=38 +lon_0=127 +k=1 +x_0=200000 +y_0=600000 +ellps=GRS80 +units=m +no_defs');

function toLatLng(x,y){
  if(!isFinite(x) || !isFinite(y)) return null;
  try{
    const [lon,lat] = proj4('EPSG:5186','WGS84',[y,x]); // proj4 expects [easting(Y), northing(X)]
    if(!isFinite(lon) || !isFinite(lat)) return null;
    return [lat,lon];
  }catch(e){ return null; }
}

let leafletMap = null, markerLayer = null, cpLayer = null, hasFitBounds = false;
let baseLayers = {}, currentBase = 'map';
function initLeaflet(){
  if(leafletMap) return;
  const host = document.getElementById('mapHost');
  leafletMap = L.map(host, {
    zoomControl:false,
    scrollWheelZoom:true,
    doubleClickZoom:true,
    maxZoom:21,
    attributionControl:false
  }).setView([37.5665,126.9780], 12);
  L.control.zoom({position:'bottomright'}).addTo(leafletMap);
  L.control.attribution({prefix:false, position:'bottomright'}).addAttribution('Seo Young Min').addTo(leafletMap);

  const tileOpts = { maxZoom:21, maxNativeZoom:19, tileSize:256 };
  baseLayers.map = L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Base/{z}/{y}/{x}.png`, tileOpts);
  const satImg = L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Satellite/{z}/{y}/{x}.jpeg`, tileOpts);
  const satLabels = L.tileLayer(`https://api.vworld.kr/req/wmts/1.0.0/${VWORLD_KEY}/Hybrid/{z}/{y}/{x}.png`, tileOpts);
  baseLayers.sat = L.layerGroup([satImg, satLabels]);

  baseLayers.map.addTo(leafletMap);
  markerLayer = L.layerGroup().addTo(leafletMap);
  cpLayer = L.layerGroup().addTo(leafletMap);
}

function setBasemap(key){
  if(!leafletMap || currentBase===key) return;
  leafletMap.removeLayer(baseLayers[currentBase]);
  baseLayers[key].addTo(leafletMap);
  currentBase = key;
  document.querySelectorAll('#basemapToggle button').forEach(b=>b.classList.toggle('active', b.dataset.b===key));
}
document.getElementById('basemapToggle').addEventListener('click',(e)=>{
  const b = e.target.closest('button');
  if(!b) return;
  setBasemap(b.dataset.b);
});

function renderControlPoints(){
  if(!cpLayer) return;
  cpLayer.clearLayers();
  (state.controlPoints||[]).forEach(cp=>{
    const ll = toLatLng(cp.x, cp.y);
    if(!ll) return;
    const icon = L.divIcon({
      className:'',
      html:`<div style="width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:14px solid #E8A33D;filter:drop-shadow(0 1px 1px rgba(0,0,0,.4));"></div>`,
      iconSize:[16,14], iconAnchor:[8,10]
    });
    const marker = L.marker(ll, {icon}).addTo(cpLayer);
    marker.bindTooltip(cp.name, {direction:'top', offset:[0,-10]});
    marker.bindPopup(`<div style="font-family:var(--mono);font-size:12px;"><b>${cp.name}</b><br>X(N): ${cp.x}<br>Y(E): ${cp.y}<br>Z(표고): ${cp.z}</div>`);
  });
}

/* 실제 하수 맨홀뚜껑 모양의 마커 아이콘 (원형 테두리 + 방사형 패턴) */
function manholeIcon(color, isSel, isActive){
  const size = isSel ? 32 : 25;
  const op = isActive ? 1 : 0.3;
  const ring = isSel ? '#0B63CE' : '#24272A';
  const ringW = isSel ? 2.6 : 1.4;
  return L.divIcon({
    className:'',
    html:`<div style="opacity:${op};filter:drop-shadow(0 1px 3px rgba(0,0,0,0.55))${isSel?' drop-shadow(0 0 5px rgba(11,99,206,0.8))':''};">
      <svg width="${size}" height="${size}" viewBox="0 0 26 26">
        <circle cx="13" cy="13" r="12" fill="#585C60" stroke="${ring}" stroke-width="${ringW}"/>
        <circle cx="13" cy="13" r="10.2" fill="#FFFFFF"/>
        <circle cx="13" cy="13" r="9" fill="${color}" stroke="#1A1C1E" stroke-width="1"/>
        <g stroke="rgba(0,0,0,0.4)" stroke-width="1">
          <line x1="13" y1="4.6" x2="13" y2="21.4"/>
          <line x1="4.6" y1="13" x2="21.4" y2="13"/>
          <line x1="6.9" y1="6.9" x2="19.1" y2="19.1"/>
          <line x1="19.1" y1="6.9" x2="6.9" y2="19.1"/>
        </g>
        <circle cx="13" cy="13" r="9" fill="none" stroke="rgba(0,0,0,0.32)" stroke-width="1"/>
        <circle cx="13" cy="13" r="3" fill="none" stroke="rgba(0,0,0,0.32)" stroke-width="0.8"/>
      </svg>
    </div>`,
    iconSize:[size,size],
    iconAnchor:[size/2,size/2]
  });
}

function renderMap(){
  initLeaflet();
  const ids = getFilteredIds();
  const activeSet = new Set(ids);
  markerLayer.clearLayers();
  renderControlPoints();

  const boundsPts = [];

  state.order.forEach(id=>{
    const m = state.manholes[id];
    if(!m) return;
    const ll = toLatLng(m.x, m.y);
    if(!ll) return;
    boundsPts.push(ll);
    const isActive = activeSet.has(id);
    const isSel = id===selectedId;
    const color = STATUS_HEX[m.status] || STATUS_HEX['미착수'];
    const marker = L.marker(ll, { icon: manholeIcon(color, isSel, isActive) }).addTo(markerLayer);
    marker.bindTooltip(m.id, {direction:'top', offset:[0,-14], opacity:0.9});
    marker.on('click', ()=>{ selectManhole(id); });
  });

  if(boundsPts.length && !hasFitBounds){
    leafletMap.fitBounds(L.latLngBounds(boundsPts), {padding:[50,50]});
    hasFitBounds = true;
  }
  setTimeout(()=>{ if(leafletMap) leafletMap.invalidateSize(); }, 60);
}

function renderTable(){
  const host = document.getElementById('tableHost');
  const ids = getFilteredIds();
  if(!ids.length){
    host.innerHTML = `<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-dim);font-size:13px;">표시할 데이터가 없습니다.</div>`;
    return;
  }
  const rowsHtml = ids.map(id=>{
    const m = state.manholes[id];
    const sel = id===selectedId ? 'selected':'';
    return `<tr class="tbrow ${sel}" data-id="${id}">
      <td style="color:${STATUS_HEX[m.status]};font-weight:700;">●</td>
      <td>${m.id}</td><td>${m.x}</td><td>${m.y}</td><td>${m.z}</td>
      <td>${m.status}</td><td>${m.lidar?'Y':'-'}</td>
      <td>${m.invert}</td><td>${m.ladder}</td><td>${m.fall}</td>
      <td>${m.inspector||'-'}</td><td>${m.date||'-'}</td>
    </tr>`;
  }).join('');
  host.innerHTML = `<div class="table-wrap"><table>
    <thead><tr><th></th><th>맨홀번호</th><th>X</th><th>Y</th><th>Z</th><th>상태</th><th>라이다</th><th>인버트</th><th>사다리</th><th>추락방지</th><th>조사자</th><th>일자</th></tr></thead>
    <tbody>${rowsHtml}</tbody>
  </table></div>`;
  host.querySelectorAll('.tbrow').forEach(r=>{
    r.addEventListener('click', ()=>{ selectManhole(r.dataset.id); });
  });
}

function renderCenter(){
  if(viewMode==='map') renderMap(); else renderTable();
}

/* ---------- render: detail panel ---------- */
function renderDetail(){
  updateMainLayout();
  const panel = document.getElementById('detailPanel');
  if(!selectedId || !state.manholes[selectedId]){
    panel.innerHTML = '';
    return;
  }
  const m = state.manholes[selectedId];
  panel.innerHTML = `
    <div class="d-title">${m.id}</div>
    <div class="d-coords">X ${m.x}　Y ${m.y}</div>

    <div class="field">
      <label>진행상태</label>
      <select id="f-status" class="status-select">
        <option value="미착수" ${m.status==='미착수'?'selected':''}>미착수</option>
        <option value="진행중" ${m.status==='진행중'?'selected':''}>진행중</option>
        <option value="완료" ${m.status==='완료'?'selected':''}>완료</option>
      </select>
    </div>

    <div class="field">
      <div class="check-row"><input type="checkbox" id="f-lidar" ${m.lidar?'checked':''}><label style="margin:0;color:var(--text);font-size:12.5px;">라이다 촬영 완료</label></div>
    </div>

    <hr class="sep">

    <div class="field">
      <label>인버트 상태 (육안조사)</label>
      <select id="f-invert">
        ${['미확인','양호','보통','불량'].map(v=>`<option value="${v}" ${m.invert===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>사다리 상태 (육안조사)</label>
      <select id="f-ladder">
        ${['미확인','양호','보통','불량','없음'].map(v=>`<option value="${v}" ${m.ladder===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div class="field">
      <label>추락방지시설 상태 (육안조사)</label>
      <select id="f-fall">
        ${['미확인','양호','보통','불량','없음'].map(v=>`<option value="${v}" ${m.fall===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>

    <hr class="sep">

    <div class="field">
      <label>조사자</label>
      <input type="text" id="f-inspector" value="${m.inspector||''}" placeholder="이름 입력">
    </div>
    <div class="field">
      <label>조사일자</label>
      <input type="date" id="f-date" value="${m.date||''}">
    </div>
    <div class="field">
      <label>비고</label>
      <textarea id="f-note" placeholder="특이사항 입력">${m.note||''}</textarea>
    </div>
  `;

  const bind = (elId, prop, evt='change') => {
    const el = document.getElementById(elId);
    el.addEventListener(evt, async ()=>{
      const v = el.type==='checkbox' ? el.checked : el.value;
      state.manholes[selectedId][prop] = v;
      await saveState();
      renderDashboard(); renderList(); renderCenter();
      showToast('저장됨');
    });
  };
  bind('f-status','status');
  bind('f-lidar','lidar');
  bind('f-invert','invert');
  bind('f-ladder','ladder');
  bind('f-fall','fall');
  bind('f-inspector','inspector','input');
  bind('f-date','date');
  bind('f-note','note','input');
}

function renderAll(){
  renderDashboard();
  renderList();
  renderCenter();
  renderDetail();
  renderCPList();
}

/* ---------- shared-data polling (near real-time sync) ---------- */
setInterval(async ()=>{
  const active = document.activeElement;
  if(active && ['INPUT','TEXTAREA','SELECT'].includes(active.tagName)) return;
  if(Date.now() - lastSaveAt < 15000) return; // 방금 내가 저장했으면 잠시 건너뛰어 덮어쓰기 방지
  try{
    const res = await window.storage.get(STORAGE_KEY, true);
    if(res && res.value){
      const remote = JSON.parse(res.value);
      if(JSON.stringify(remote) !== JSON.stringify(state)){
        state = remote;
        renderAll();
      }
    }
  }catch(e){ /* ignore */ }
}, 12000);

window.addEventListener('resize', ()=>{ renderCenter(); updateMainLayout(); });

(async function init(){
  await loadState();
  renderAll();
  setMobileTab('map');
  showStatusSub('manhole');
})();
</script>
</body>
</html>
